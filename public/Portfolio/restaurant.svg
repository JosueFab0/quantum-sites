<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#3d1f0a"/>
  <rect x="0" y="0" width="800" height="500" fill="url(#grain)" opacity="0.4"/>
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>
  <!-- Plate -->
  <circle cx="400" cy="260" r="130" fill="none" stroke="#c8a97e" stroke-width="1.5" opacity="0.6"/>
  <circle cx="400" cy="260" r="100" fill="none" stroke="#c8a97e" stroke-width="0.5" opacity="0.3"/>
  <!-- Fork -->
  <line x1="260" y1="160" x2="260" y2="360" stroke="#c8a97e" stroke-width="1.5" opacity="0.5"/>
  <line x1="252" y1="160" x2="252" y2="220" stroke="#c8a97e" stroke-width="1" opacity="0.4"/>
  <line x1="268" y1="160" x2="268" y2="220" stroke="#c8a97e" stroke-width="1" opacity="0.4"/>
  <!-- Knife -->
  <line x1="540" y1="160" x2="540" y2="360" stroke="#c8a97e" stroke-width="1.5" opacity="0.5"/>
  <!-- Text -->
  <text x="400" y="80" font-family="Georgia, serif" font-size="14" fill="#c8a97e" opacity="0.7" text-anchor="middle" letter-spacing="6">RESTAURANTE PREMIUM</text>
  <text x="400" y="460" font-family="Georgia, serif" font-size="11" fill="#c8a97e" opacity="0.4" text-anchor="middle" letter-spacing="3">DISEÑO CONCEPTUAL</text>
</svg>